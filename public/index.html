<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beef Gambling</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/landing.css" />
  <link rel="stylesheet" href="css/lobby.css" />
  <link rel="stylesheet" href="css/components/mines.css" />
  <link rel="stylesheet" href="css/components/plinko.css" />
</head>
<body>

  <div id="landing-screen" class="screen active">
    <canvas id="lava-canvas"></canvas>
    <div id="flash-overlay"></div>
    <div class="landing-content">
      <h1 class="landing-title" data-text="BEEF GAMBLING">Beef Gambling</h1>
      <div class="landing-buttons">
        <button id="play-btn" class="landing-btn">Play</button>
        <button id="info-btn" class="landing-btn">Information</button>
      </div>
    </div>
  </div>

  <div id="lobby-screen" class="screen">
    <div class="dashboard">

      <div class="topbar">
        <div class="topbar-brand">BEEF GAMBLING</div>
        <div class="balance-pill">$<span id="balance-amount">1,000.00</span></div>
      </div>

      <div class="tab-bar">
        <button class="tab-btn" data-tab="dice" disabled>Dice</button>
        <button class="tab-btn active" data-tab="mines">Mines</button>
        <button class="tab-btn" data-tab="plinko">Plinko</button>
        <button class="tab-btn" data-tab="profile">Profile</button>
      </div>

      <div class="tab-content">

        <div id="mines-tab" class="tab-panel active">
          <div class="mines-layout">
            <div class="mines-controls">
              <div class="game-wager-box mines-wager">
                <label class="game-wager-label">Bet Amount</label>
                <div class="game-wager-row">
                  <input id="mines-bet-input" type="number" value="10" min="1" />
                  <div class="game-wager-shortcuts">
                    <button data-target="mines" data-action="min">Min</button>
                    <button data-target="mines" data-action="half">½</button>
                    <button data-target="mines" data-action="max">Max</button>
                  </div>
                </div>
              </div>
              <label>
                Grid Size
                <select id="mines-grid-select"></select>
              </label>
              <label>
                Mines
                <select id="mines-mine-select"></select>
              </label>
              <button id="mines-start-btn" class="action-btn primary">Start Game</button>
              <button id="mines-cashout-btn" class="action-btn cashout">Cash Out</button>
              <div class="mines-stats">
                <div>Multiplier: <span id="mines-multiplier">1.00x</span></div>
                <div>Payout: <span id="mines-payout">$0.00</span></div>
              </div>
              <div id="mines-status" class="status-text"></div>
            </div>
            <div id="mines-grid" class="mines-grid"></div>
          </div>
        </div>

        <div id="dice-tab" class="tab-panel">
          <p class="coming-soon">Dice — coming soon</p>
        </div>

        <div id="plinko-tab" class="tab-panel">
          <div class="plinko-layout">

            <div class="plinko-board-area">
              <div class="plinko-controls">
                <div class="game-wager-box plinko-wager">
                  <label class="game-wager-label">Bet Amount</label>
                  <div class="game-wager-row">
                    <input id="plinko-bet-input" type="number" value="10" min="1" />
                    <div class="game-wager-shortcuts">
                      <button data-target="plinko" data-action="min">Min</button>
                      <button data-target="plinko" data-action="half">½</button>
                      <button data-target="plinko" data-action="max">Max</button>
                    </div>
                  </div>
                </div>
                <label>
                  Rows
                  <select id="plinko-risk-select"></select>
                </label>
                <button id="plinko-drop-btn" class="action-btn primary">Drop Ball</button>
                <div class="plinko-stats">
                  <div>Last Multiplier: <span id="plinko-multiplier">--</span></div>
                  <div>Last Payout: <span id="plinko-payout">$0.00</span></div>
                </div>
                <div id="plinko-status" class="status-text"></div>
              </div>
              <canvas id="plinko-canvas"></canvas>
            </div>

            <div class="plinko-sidepanels">
              <div class="plinko-panel plinko-bigwin-card">
                <div class="plinko-panel-title">Big Win</div>
                <div id="plinko-bigwin-panel"></div>
              </div>
              <div class="plinko-panel plinko-history-card">
                <div class="plinko-panel-title">Recent Drops</div>
                <div id="plinko-history-list" class="plinko-history-list"></div>
              </div>
            </div>

          </div>
        </div>

        <div id="profile-tab" class="tab-panel">
          <div class="profile-card">
            <div class="profile-header">
              <div class="profile-avatar">U</div>
              <div>
                <div class="profile-name">Player</div>
                <div class="profile-badge">Bronze Novice</div>
              </div>
            </div>
            <div class="profile-stats">
              <div class="profile-stat">
                <div class="stat-label">Total Wagered</div>
                <div class="stat-value" id="profile-wagered">$0.00</div>
              </div>
              <div class="profile-stat">
                <div class="stat-label">Total Wins</div>
                <div class="stat-value win" id="profile-wins">$0.00</div>
              </div>
              <div class="profile-stat">
                <div class="stat-label">Total Losses</div>
                <div class="stat-value loss" id="profile-losses">$0.00</div>
              </div>
              <div class="profile-stat">
                <div class="stat-label">Net Worth</div>
                <div class="stat-value" id="profile-networth">$1,000.00</div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/landingAnimation.js"></script>
  <script src="js/games/mines/minesGame.js"></script>
  <script src="js/games/mines/minesRenderer.js"></script>
  <script src="js/games/mines/minesUI.js"></script>
  <script src="js/games/plinko/plinkoPhysics.js"></script>
  <script src="js/games/plinko/plinkoGame.js"></script>
  <script src="js/games/plinko/plinkoRenderer.js"></script>
  <script src="js/games/plinko/plinkoVFX.js"></script>
  <script src="js/games/plinko/plinkoUI.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
